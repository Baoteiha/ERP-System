<div>
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h1 class="page-title">Sales Orders</h1>
      <p class="page-subtitle">{{ orders.length }} orders this week</p>
    </div>
    <button class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>New Order</button>
  </div>
  <div class="erp-card">
    <table class="erp-table">
      <thead>
        <tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        @for (o of orders; track o.id) {
          <tr>
            <td style="font-weight:600;color:var(--blue)">{{ o.id }}</td>
            <td>{{ o.customer }}</td>
            <td style="color:var(--text-muted)">{{ o.items }}</td>
            <td>{{ o.amount }}</td>
            <td style="color:var(--text-muted)">{{ o.date }}</td>
            <td><span [class]="getStatusClass(o.status)">{{ o.status }}</span></td>
            <td>
              <button class="btn btn-sm" style="padding:3px 8px;border:1px solid var(--border);font-size:0.75rem"><i class="bi bi-eye"></i></button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
