<aside class="sidebar">
  <div class="sidebar-logo">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:1rem">N</div>
      <div>
        <p class="brand-name">Núi Thần Tài</p>
        <p class="brand-sub">ERP Platform</p>
      </div>
    </div>
  </div>

  <nav style="flex:1;padding:0.5rem 0">
    @for (section of navSections; track section.label) {
      <div class="nav-section-label">{{ section.label }}</div>
      @for (item of section.items; track item.route) {
        <div class="nav-item">
          <a [routerLink]="item.route" routerLinkActive="active">
            <i class="bi {{ item.icon }}"></i>
            {{ item.label }}
          </a>
        </div>
      }
    }
  </nav>

  <div style="padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,0.1)">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="avatar">BN</div>
      <div>
        <div style="color:white;font-size:0.8rem;font-weight:600">Bao Pham</div>
        <div style="color:rgba(255,255,255,0.5);font-size:0.7rem">Administrator</div>
      </div>
    </div>
  </div>
</aside>
