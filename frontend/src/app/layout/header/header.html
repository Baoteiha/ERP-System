<header class="header">
  <div class="header-search">
    <div class="header-search-wrap">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="Search products, orders, employees...">
    </div>
  </div>

  <div class="header-right">
    <button class="header-icon-btn" title="Notifications">
      <i class="bi bi-bell"></i>
      <span class="notif-dot"></span>
    </button>
    <button class="header-icon-btn" title="Help">
      <i class="bi bi-question-circle"></i>
    </button>
    <div class="dropdown">
      <div class="avatar" data-bs-toggle="dropdown" style="cursor:pointer" title="Profile">
        {{ auth.currentUser()?.username?.slice(0,2)?.toUpperCase() || 'U' }}
      </div>
      <ul class="dropdown-menu dropdown-menu-end" style="font-size:0.85rem;min-width:180px">
        <li style="padding:8px 16px 6px">
          <div style="font-weight:600">{{ auth.currentUser()?.username }}</div>
          <div style="color:var(--text-muted);font-size:0.75rem">{{ auth.currentUser()?.role }}</div>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li><button class="dropdown-item d-flex align-items-center gap-2" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i> Sign out
        </button></li>
      </ul>
    </div>
  </div>
</header>
